networks:
  qtc_network:
    driver: bridge

volumes:
  qtc_postgres_data:
  qtc_mongo_data:
  qtc_redis_data:

services:
  postgres_local:
    container_name: qtc_postgres_local
    image: postgres:16.1-alpine
    restart: unless-stopped
    networks:
      - qtc_network
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE_NAME:-postgres_qtc}
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    volumes:
      - qtc_postgres_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT:-9432}:5432

  mongo_local:
    container_name: qtc_mongo_local
    image: mongo:8.0.15-noble
    restart: unless-stopped
    networks:
      - qtc_network
    volumes:
      - qtc_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE_NAME:-mongo_qtc}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_password}
    ports:
      - ${MONGO_PORT:-9017}:27017

  redis_local:
    container_name: qtc_redis_local
    image: redis:7.4.0-alpine
    restart: unless-stopped
    networks:
      - qtc_network
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:-redis_password}",
        "--save",
        "60",
        "1",
        "--dir",
        "/data",
      ]
    volumes:
      - qtc_redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
    ports:
      - ${REDIS_PORT:-9379}:6379

  adminer_local:
    container_name: qtc_adminer_local
    image: adminer:4.8.1
    restart: unless-stopped
    networks:
      - qtc_network
    depends_on:
      - postgres_local
    ports:
      - ${ADMINER_PORT:-9080}:8080

  mongo_express_local:
    container_name: qtc_mongo_express_local
    image: mongo-express:1.0.2-20
    restart: unless-stopped
    networks:
      - qtc_network
    depends_on:
      - mongo_local
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME:-mongo_user}:${MONGO_PASSWORD:-mongo_password}@mongo_local:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-mongo_express_user}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-mongo_express_password}
    ports:
      - ${MONGO_EXPRESS_PORT:-9081}:8081

  redis_insight_local:
    container_name: qtc_redis_insight_local
    image: redis/redisinsight:2.52
    restart: unless-stopped
    networks:
      - qtc_network
    depends_on:
      - redis_local
    ports:
      - "${REDIS_INSIGHT_PORT:-9540}:5540"
